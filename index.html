<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore Centro di Gravità Storico</title>
    <!-- Mappe Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --success-hover: #15803d;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg: #f8fafc;
            --panel-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
        }

        header {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        header p { margin: 5px 0 0 0; opacity: 0.9; font-size: 14px; }

        .main-container {
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 968px) {
            .main-container { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--panel-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -4px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }

        .panel-title {
            font-size: 18px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Tabella stili */
        .table-wrapper { overflow-x: auto; margin-bottom: 20px; border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #f1f5f9; padding: 12px; font-weight: 600; color: #475569; }
        td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }

        input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

/* Stile aggiornato per far fluttuare la lista sopra la tabella */
        .geo-cell { position: relative; display: flex; gap: 4px; align-items: center; }
        .autocomplete-list {
            position: fixed; /* FIX: Ora fluttua sopra ogni contenitore con overflow */
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 9999; /* Super prioritario su mappe e tabelle */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            margin-top: 4px;
            box-sizing: border-box;
        }
        .autocomplete-item {
            padding: 10px 12px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text);
        }
        .autocomplete-item:hover {
            background-color: #f1f5f9;
        }
        .autocomplete-item:last-child { border-bottom: none; }

        /* Bottoni */
        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-add { background-color: #eff6ff; color: var(--primary); font-weight: 600; margin-bottom: 15px; }
        .btn-add:hover { background-color: #dbeafe; }
        .btn-search { background-color: #f1f5f9; color: #475569; padding: 8px; }
        .btn-search:hover { background-color: #e2e8f0; color: var(--text); }
        .btn-del { background-color: #fef2f2; color: var(--danger); padding: 8px; }
        .btn-del:hover { background-color: #fee2e2; }
        .btn-calc { background-color: var(--success); color: white; width: 100%; padding: 14px; font-size: 16px; font-weight: 600; border-radius: 8px; margin-top: 10px; }
        .btn-calc:hover { background-color: var(--success-hover); box-shadow: 0 4px 6px -1px rgba(22, 163, 74, 0.2); }

        /* Mappa e Statistiche */
        .sticky-right { position: sticky; top: 30px; display: flex; flex-direction: column; gap: 24px; height: calc(100vh - 150px); min-height: 500px; }
        #map { width: 100%; flex-grow: 1; border-radius: 12px; border: 1px solid var(--border); z-index: 1; }
        
        .stats-card {
            background: linear-gradient(to right, #f0fdf4, #dcfce7);
            border-left: 5px solid var(--success);
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
        }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 5px; }
        .stat-val { font-size: 18px; font-weight: 700; color: #166534; }
    </style>
</head>
<body>

<header>
    <h1>🌍 Center of Mass of Your Life</h1>
    <p>Calculates the mean position of your life.</p>
</header>

<div class="main-container">
    <!-- PANEL DI SINISTRA: INPUT -->
    <div class="panel">
        <div class="panel-title">📋 Input the places you have lived in:</div>
        
        <div class="table-wrapper">
            <table id="tabella-soggiorni">
                <thead>
                    <tr>
                        <th style="width: 40%;">Address</th>
                        <th style="width: 15%;">Latitude</th>
                        <th style="width: 15%;">Longitude</th>
                        <th style="width: 18%;">Start Date</th>
                        <th style="width: 18%;">End Date</th>
                        <th style="width: 4%;"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <div class="geo-cell">
                                <!-- FIX: Aggiunto oninput per la prima riga di default -->
                                <input type="text" class="citta" value="Milano Piazza Duomo" oninput="gestisciInputInTempoReale(this)">
                                <div class="autocomplete-list" style="display:none;"></div>
                            </div>
                        </td>
                        <td><input type="number" step="any" class="lat" value="45.463910"></td>
                        <td><input type="number" step="any" class="lon" value="9.190640"></td>
                        <td><input type="date" class="inizio" value="2000-01-01"></td>
                        <td><input type="date" class="fine" value="2001-01-01"></td>
                        <td><button class="btn-del" onclick="eliminaRiga(this)">✕</button></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <button class="btn-add" onclick="aggiungiRiga()">➕ Add New</button>
        <button class="btn-calc" onclick="calcolaTutto()">🌍 Generate Map</button>
    </div>

    <!-- PANEL DI DESTRA: MAPPA & OUTPUT (STICKY) -->
    <div class="sticky-right">
        <div id="stats-box" class="stats-card" style="display:none;">
            <div class="stats-grid">
                <div>⌛ Total Days:<br><span id="stat-giorni" class="stat-val">-</span></div>
                <div>📍 Center of Mass:<br><span id="stat-coord" class="stat-val">-</span></div>
            </div>
        </div>
        <div id="map"></div>
    </div>
</div>

<script>
    // Inizializza mappa su Italia
    var map = L.map('map').setView([42.0, 12.5], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
    var markerGroup = L.layerGroup().addTo(map);

    var markerAnteprima = null;
    var ternaTimer = null; 

    // FIX: Ripristinate le colonne Latitudine e Longitudine mancanti nella nuova riga
    function aggiungiRiga() {
        var tbody = document.querySelector("#tabella-soggiorni tbody");
        var tr = document.createElement("tr");
        tr.innerHTML = `
            <td>
                <div class="geo-cell">
                    <input type="text" class="citta" placeholder="Es: Roma Piazza Navona" oninput="gestisciInputInTempoReale(this)">
                    <div class="autocomplete-list" style="display:none;"></div>
                </div>
            </td>
            <td><input type="number" step="any" class="lat" placeholder="Latitude..."></td>
            <td><input type="number" step="any" class="lon" placeholder="Longitude..."></td>
            <td><input type="date" class="inizio"></td>
            <td><input type="date" class="fine"></td>
            <td><button class="btn-del" onclick="eliminaRiga(this)">✕</button></td>
        `;
        tbody.appendChild(tr);
    }

    function gestisciInputInTempoReale(inputEl) {
        var riga = inputEl.closest("tr");
        var listaSuggerimenti = riga.querySelector(".autocomplete-list");
        var testo = inputEl.value;

        clearTimeout(ternaTimer);

        if (testo.trim().length < 3) {
            listaSuggerimenti.innerHTML = "";
            listaSuggerimenti.style.display = "none";
            return;
        }

        ternaTimer = setTimeout(async function() {
            try {
                var url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(testo)}&limit=4`;
                var response = await fetch(url, { 
                    headers: { 
                        'Accept-Language': 'it',
                        'User-Agent': 'CalcolatoreCentroGravitaStorico/1.0'
                    } 
                });
                
                if (!response.ok) return;
                var data = await response.json();

                listaSuggerimenti.innerHTML = "";
                
                if (data && data.length > 0) {
                    listaSuggerimenti.style.display = "block";
                    data.forEach(function(item) {
                        var div = document.createElement("div");
                        div.className = "autocomplete-item";
                        div.innerText = item.display_name;
                        
                        div.onclick = function() {
                            inputEl.value = item.display_name;
                            riga.querySelector(".lat").value = parseFloat(item.lat).toFixed(6);
                            riga.querySelector(".lon").value = parseFloat(item.lon).toFixed(6);
                            
                            listaSuggerimenti.style.display = "none";
                            mostraAnteprimaMappa(parseFloat(item.lat), parseFloat(item.lon), item.display_name);
                        };
                        listaSuggerimenti.appendChild(div);
                    });
                } else {
                    listaSuggerimenti.style.display = "none";
                }
            } catch (error) {
                console.error("Errore autocompletamento:", error);
            }
        }, 500);
    }

    // Chiude i menu dei suggerimenti se clicchi fuori
    document.addEventListener("click", function(e) {
        if (!e.target.classList.contains("citta")) {
            document.querySelectorAll(".autocomplete-list").forEach(function(list) {
                list.style.display = "none";
            });
        }
    });

    function mostraAnteprimaMappa(lat, lon, indirizzo) {
        if (markerAnteprima) { map.removeLayer(markerAnteprima); }
        markerAnteprima = L.circleMarker([lat, lon], {
            radius: 10,
            fillColor: "#f97316",
            color: "#ffffff",
            weight: 2,
            fillOpacity: 0.9
        }).addTo(map);
        markerAnteprima.bindPopup(`<b>📍 Selected:</b><br>${indirizzo}`).openPopup();
        map.setView([lat, lon], 14);
    }

    function eliminaRiga(btn) { 
        btn.closest("tr").remove(); 
    }

    function calcolaTutto() {
        markerGroup.clearLayers();
        
        var cittaEl = document.querySelectorAll(".citta");
        var latEl = document.querySelectorAll(".lat");
        var lonEl = document.querySelectorAll(".lon");
        var inizioEl = document.querySelectorAll(".inizio");
        var fineEl = document.querySelectorAll(".fine");
        
        var datiValidi = [];
        var totaleGiorni = 0;
        
        for (var i = 0; i < latEl.length; i++) {
            var lat = parseFloat(latEl[i].value);
            var lon = parseFloat(lonEl[i].value);
            var nomePosto = cittaEl[i].value || `Luogo ${i+1}`;
            
            if (isNaN(lat) || isNaN(lon) || !inizioEl[i].value || !fineEl[i].value) continue;
            
            var d1 = new Date(inizioEl[i].value);
            var d2 = new Date(fineEl[i].value);
            
            var diffTime = d2.getTime() - d1.getTime();
            var giorni = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
            
            if (giorni > 0) {
                datiValidi.push({lat: lat, lon: lon, giorni: giorni, nome: nomePosto});
                totaleGiorni += giorni;
            }
        }
        
        if (datiValidi.length === 0) {
            alert("Enter and calculate at least one row with complete data and dates!");
            return;
        }
        
        var latMedia = 0;
        var lonMedia = 0;
        var posizioniUniche = {};
        
        datiValidi.forEach(function(p) {
            latMedia += p.lat * p.giorni;
            lonMedia += p.lon * p.giorni;
            
            var chiaveCoordinata = p.lat.toFixed(5) + "," + p.lon.toFixed(5);
            if (!posizioniUniche[chiaveCoordinata]) {
                posizioniUniche[chiaveCoordinata] = {giorni: 0, nomi: []};
            }
            posizioniUniche[chiaveCoordinata].giorni += p.giorni;
            if(!posizioniUniche[chiaveCoordinata].nomi.includes(p.nome)) {
                posizioniUniche[chiaveCoordinata].nomi.push(p.nome);
            }
        });
        
        latMedia = latMedia / totaleGiorni;
        lonMedia = lonMedia / totaleGiorni;
        
        document.getElementById("stats-box").style.display = "block";
        document.getElementById("stat-giorni").innerText = totaleGiorni + " gg";
        document.getElementById("stat-coord").innerText = `${latMedia.toFixed(4)}, ${lonMedia.toFixed(4)}`;
        
        for (var chiave in posizioniUniche) {
            var coords = chiave.split(",").map(Number);
            L.marker(coords).addTo(markerGroup)
                .bindPopup(`<b>🏠 ${posizioniUniche[chiave].nomi.join(" / ")}</b><br>Stayed here for a total of: <b>${posizioniUniche[chiave].giorni} days</b>`);
        }
        
        L.circleMarker([latMedia, lonMedia], {
            radius: 14,
            fillColor: "#ef4444",
            color: "#ffffff",
            weight: 3,
            fillOpacity: 1
        }).addTo(markerGroup).bindPopup(`<b>📍 WEIGHTED CENTER OF MASS</b><br>The perfect weighted coordinate based on the duration of all your movements.`).openPopup();
        
        map.setView([latMedia, lonMedia], 6);
    }

    window.onload = calcolaTutto;
</script>

</body>
</html>
